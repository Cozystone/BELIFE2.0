name: Verify BELIFE

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Desktop smoke E2E
        env:
          DATABASE_URL: ${{ secrets.BELIFE_CI_E2E_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Skipping E2E because BELIFE_CI_E2E_DATABASE_URL is not configured."
            exit 0
          fi

          npx playwright install --with-deps chromium
          npm run test:e2e -- --project=desktop --reporter=line
